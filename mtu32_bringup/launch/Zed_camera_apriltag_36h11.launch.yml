launch:
- arg:
    name: device
    default: "0"

- node_container:
    pkg: rclcpp_components
    exec: component_container
    name: apriltag_container
    namespace: "/j100_0921/sensors/camera_0/color"
    composable_node:
    - pkg: apriltag_ros
      plugin: AprilTagNode
      name: apriltag
      namespace: /j100_0921/sensors/camera_0/color
      remap:
      - from: image_rect
        to: /j100_0921/sensors/camera_0/color/image
      - from: /camera/camera_info
        to: /j100_0921/sensors/camera_0/color/image/camera_info
      - from: detections
        to: /j100_0921/sensors/camera_0/color/aprilTag_detections
      - from: /tf
        to: /j100_0921/tf
      
      param:
      - from: $(find-pkg-share mtu32_bringup)/config/tags_36h11.yaml
      extra_arg:
      - name: use_intra_process_comms
        value: "True"
